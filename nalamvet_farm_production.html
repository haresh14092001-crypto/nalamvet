<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NalamVet Production — Professional Veterinary System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #080b12; --surface: #0f1320; --surface2: #161d2e; --surface-hover: #1e2740;
            --border: #232d44; --accent: #00e5a0; --accent-hover: #00cc8e;
            --accent2: #4d9fff; --warn: #ffb020; --danger: #ff3b5c;
            --text: #e8edf8; --muted: #7a86a5;
            --gradient: linear-gradient(135deg, #00e5a0 0%, #0090ff 100%);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        .app-layout { display: none; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .logo-area { padding: 24px; border-bottom: 1px solid var(--border); }
        .app-name { font-size: 20px; font-weight: 800; }
        .app-name span { color: var(--accent); }
        .nav-menu { padding: 12px; flex: 1; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; cursor: pointer; color: var(--muted); font-size: 14px; margin-bottom: 4px; }
        .nav-item.active { background: rgba(0,229,160,0.1); color: var(--accent); font-weight: 600; }
        .lang-toggle { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 4px; }
        .lang-btn { flex: 1; text-align: center; font-size: 10px; font-weight: 700; padding: 8px; cursor: pointer; background: var(--surface2); border-radius: 6px; }
        .lang-btn.active { background: var(--accent); color: #000; }
        .main-content { flex: 1; overflow-y: auto; background: var(--bg); position: relative; }
        .page { display: none; padding: 32px; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .header { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .btn { border: none; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: #000; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 20px; padding: 20px; }
        .card-header { font-size: 14px; font-weight: 700; margin-bottom: 15px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px; display: flex; justify-content: space-between; cursor: pointer; }
        .form-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 15px; }
        .col-4 { grid-column: span 4; } .col-6 { grid-column: span 6; } .col-12 { grid-column: span 12; }
        label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; display: block; }
        input, select, textarea { width: 100%; padding: 10px; background: var(--surface2); border: 1px solid var(--border); color: #fff; border-radius: 6px; }
        .chk-pill { background: var(--surface2); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; margin: 2px; }
        .chk-pill.active { background: rgba(0,229,160,0.15); border-color: var(--accent); color: var(--accent); }
        .chk-pill input { display: none; }
        .hint-box { background: rgba(0,229,160,0.05); border: 1px dashed var(--accent); color: var(--accent); padding: 12px; border-radius: 8px; font-size: 12px; margin-top: 10px; }
        .rx-row { background: var(--surface2); border-left: 4px solid var(--accent); padding: 12px; border-radius: 6px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .rx-del { color: var(--danger); cursor: pointer; font-weight: 700; }
        .ac-box { position: absolute; background: var(--surface2); border: 1px solid var(--accent); z-index: 1000; border-radius: 8px; max-height: 200px; overflow-y: auto; width: 100%; display: none; }
        .ac-item { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 13px; }
        .ac-item:hover { background: var(--accent); color: #000; }
        @media print { .sidebar, .no-print { display: none !important; } .main-content { background: #fff; color: #000; overflow: visible; } body { background: #fff; } .page { display: none !important; } #print-view { display: block !important; padding: 40px; } }
    </style>
</head>
<body>

<div id="auth-screen" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;">
    <div style="max-width:440px;width:100%;background:var(--surface);padding:48px 40px;border-radius:20px;border:1px solid rgba(0,229,160,0.3);text-align:center;box-shadow:0 20px 60px rgba(0,229,160,0.15);">
        <div style="font-size:52px;margin-bottom:14px;filter:drop-shadow(0 0 12px rgba(0,229,160,0.4));">🌾</div>
        <div style="font-size:28px;font-weight:800;margin-bottom:6px;">NalamVet <span style="background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Production</span></div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:28px;">Farm & Clinic Operations System</div>

        <div style="text-align:left;margin-bottom:14px;">
            <label style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:8px;">Select Role</label>
            <select id="auth-role" onchange="updateProdRolePreview()" style="width:100%;padding:13px 16px;font-size:15px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);outline:none;">
                <option value="">— Choose Role —</option>
                <option value="farm_manager">🌾 Farm Manager</option>
                <option value="veterinarian">🩺 Veterinarian</option>
            </select>
        </div>

        <div id="prod-role-preview" style="margin-bottom:14px;display:none;">
            <div id="prod-role-badge" style="display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;"></div>
        </div>

        <div style="text-align:left;margin-bottom:14px;">
            <label style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:8px;">PIN</label>
            <input type="password" id="pin" placeholder="· · · ·" maxlength="6" style="width:100%;padding:14px;font-size:22px;text-align:center;letter-spacing:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);outline:none;" onkeypress="if(event.key==='Enter') auth()">
        </div>

        <button class="btn btn-primary" onclick="auth()" style="width:100%;justify-content:center;padding:14px;font-size:15px;">🔓 Unlock System</button>
        <div id="auth-err" style="color:var(--danger);font-size:12px;margin-top:12px;display:none;padding:8px;background:rgba(255,59,92,0.08);border-radius:8px;"></div>
    </div>
</div>

<div class="app-layout" id="app">
    <aside class="sidebar">
        <div class="logo-area"><h1 class="app-name">NalamVet <span>Production</span></h1></div>
        <div id="user-pill" style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-radius:10px;margin:8px 12px 0;border:1px solid var(--border);">
          <span id="sidebar-avatar" style="font-size:20px;">🌾</span>
          <div style="flex:1;min-width:0;">
            <div id="sidebar-name" style="font-size:12px;font-weight:700;color:var(--text);">—</div>
            <div id="sidebar-role" style="font-size:10px;color:var(--muted);">—</div>
          </div>
          <span onclick="logout()" title="Logout" style="cursor:pointer;color:var(--muted);font-size:13px;padding:3px;">⏏</span>
        </div>
        <nav class="nav-menu" id="navMenu">
            <div class="nav-item active" data-page="dash" onclick="nav('dash',this)">📊 <span data-i18n="Dashboard">Dashboard</span></div>
            <div class="nav-item" data-page="cons" onclick="nav('cons',this)">🩺 <span data-i18n="Consultation">Consultation</span></div>
            <div class="nav-item" data-page="drugs" onclick="nav('drugs',this)">💊 <span data-i18n="Medicines">Medicines</span></div>
            <div class="nav-item" data-page="sets" onclick="nav('sets',this)">⚙️ <span data-i18n="Settings">Settings</span></div>
        </nav>
        <div class="lang-toggle">
            <div class="lang-btn active" onclick="setL('en',this)">EN</div>
            <div class="lang-btn" onclick="setL('ta',this)">தமிழ்</div>
            <div class="lang-btn" onclick="setL('hi',this)">हिंदी</div>
        </div>
    </aside>
    <main class="main-content">
        <div id="p-dash" class="page active">
            <div class="header"><div><h2 data-i18n="Clinical Overview">Clinical Overview</h2></div><button class="btn btn-primary" onclick="nav('cons')">➕ <span data-i18n="New Case">New Case</span></button></div>
            <div class="card"><h3 data-i18n="Recent Records">Recent Records</h3><table id="dashTable" style="width:100%;margin-top:15px;border-collapse:collapse;"></table></div>
        </div>
        <div id="p-cons" class="page">
            <div class="header"><h2 data-i18n="New Consultation">New Consultation</h2><button class="btn btn-primary" onclick="save()">💾 <span data-i18n="Save Record">Save Record</span></button></div>
            <div class="card">
                <div class="card-header"><span data-i18n="Patient Details">Patient Details</span></div>
                <div class="form-grid">
                    <div class="col-4"><label data-i18n="Owner Name">Owner Name</label><input type="text" id="owner"></div>
                    <div class="col-4"><label data-i18n="Species">Species</label><select id="species" onchange="calc()"><option value="Dog">Dog</option><option value="Cattle">Cattle</option><option value="Poultry">Poultry</option></select></div>
                    <div class="col-4"><label data-i18n="Weight (kg)">Weight (kg)</label><input type="number" id="wt" oninput="calc()"></div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><span data-i18n="Clinical Signs">Clinical Signs</span></div>
                <div id="signs-box">
                    <label class="chk-pill" onclick="tglSigns(this)"><input type="checkbox" value="Fever"> <span data-i18n="Fever">Fever</span></label>
                    <label class="chk-pill" onclick="tglSigns(this)"><input type="checkbox" value="Milk Drop"> <span data-i18n="Milk Drop">Milk Drop</span></label>
                    <label class="chk-pill" onclick="tglSigns(this)"><input type="checkbox" value="Bloat"> <span data-i18n="Bloat">Bloat</span></label>
                    <label class="chk-pill" onclick="tglSigns(this)"><input type="checkbox" value="Off-feed"> <span data-i18n="Off-feed">Off-feed</span></label>
                    <label class="chk-pill" onclick="tglSigns(this)"><input type="checkbox" value="Vomiting"> <span data-i18n="Vomiting">Vomiting</span></label>
                </div>
                <div id="hint" class="hint-box" style="display:none"></div>
            </div>
            <div class="card">
                <div class="card-header"><span data-i18n="Prescription">Prescription</span></div>
                <div style="position:relative"><label data-i18n="Search Medicine">Search Medicine</label><input type="text" id="srch" oninput="ac(this.value)"><div id="ac" class="ac-box"></div></div>
                <div id="rx-list" style="margin-top:20px;"></div>
                <div style="margin-top:20px;text-align:right"><button class="btn btn-primary" onclick="window.print()" data-i18n="Print Receipt">Print Receipt</button></div>
            </div>
        </div>
        <div id="p-sets" class="page">
            <div class="header"><h2 data-i18n="Clinic Settings">Clinic Settings</h2></div>
            <div class="card"><label data-i18n="Clinic Name">Clinic Name</label><input type="text" id="cname"></div>
        </div>
        <div id="print-view" style="display:none"></div>
    </main>
</div>

<script>
const DB = [
    {n:"Meloxicam", b:"Metacin, Melonex", g:"Dog:0.2, Cattle:0.5", u:"mg/kg"},
    {n:"Buparvaquone", b:"Bupacore, Zubion", g:"Cattle:2.5", u:"mg/kg"},
    {n:"Ceftiofur", b:"Excenel", g:"Cattle:1.1", u:"mg/kg"},
    {n:"Enrofloxacin", b:"Baytril", g:"Dog:5, Cattle:5", u:"mg/kg"},
    {n:"Ceftriaxone", b:"Intacef", g:"Cattle:10, Dog:25", u:"mg/kg"},
    {n:"Diminazene", b:"Berenil", g:"Cattle:3.5", u:"mg/kg"},
    {n:"Ivermectin", b:"Neomec", g:"Cattle:0.2", u:"mg/kg"}
];
const HINTS = [
    {s:["Fever","Milk Drop","Off-feed"], d:"Suggested: Ephemeral Fever (Three day sickness)"},
    {s:["Bloat","Off-feed"], d:"Suggested: Ruminal Acidosis / Indigestion"},
    {s:["Fever","Off-feed"], d:"Suggested: Tick Fever (Theileria/Babesia)"}
];
const LANG = {
    ta: {"Dashboard":"டாஷ்போர்டு","Consultation":"ஆலோசனை","Medicines":"மருந்துகள்","New Case":"புதிய வழக்கு","Fever":"காய்ச்சல்","Weight (kg)":"எடை (கி.கி)","Save Record":"சேமிக்க"},
    hi: {"Dashboard":"डैशबोर्ड","Consultation":"परामर्श","Medicines":"दवाइयाँ","New Case":"नया मामला","Fever":"बुखार","Weight (kg)":"वजन (किग्रा)"}
};

// ===== RBAC =====
const PROD_ROLES = {
    farm_manager: { pin: '1111', label: 'Farm Manager', avatar: '🌾', allowed: ['dash','sets'] },
    veterinarian:  { pin: '1234', label: 'Veterinarian',  avatar: '🩺', allowed: ['dash','cons','drugs','sets'] }
};
let prodRole = null;

function updateProdRolePreview() {
    const r = document.getElementById('auth-role').value;
    const preview = document.getElementById('prod-role-preview');
    const badge = document.getElementById('prod-role-badge');
    if (r && PROD_ROLES[r]) {
        preview.style.display = 'block';
        const st = r === 'farm_manager' ? 'background:rgba(255,176,32,0.15);color:#ffb020;border:1px solid rgba(255,176,32,0.3);' : 'background:rgba(0,229,160,0.1);color:var(--accent);border:1px solid rgba(0,229,160,0.25);';
        badge.style.cssText = st;
        badge.textContent = PROD_ROLES[r].avatar + ' ' + PROD_ROLES[r].label;
    } else { preview.style.display = 'none'; }
}

function auth() {
    const roleKey = document.getElementById('auth-role').value;
    const pin = document.getElementById('pin').value.trim();
    const errEl = document.getElementById('auth-err');
    if (!roleKey) { errEl.textContent = 'Please select a role.'; errEl.style.display='block'; return; }
    if (!pin) { errEl.textContent = 'Please enter your PIN.'; errEl.style.display='block'; return; }
    const role = PROD_ROLES[roleKey];
    if (!role || role.pin !== pin) { errEl.textContent = '❌ Invalid PIN. Please try again.'; errEl.style.display='block'; return; }
    prodRole = roleKey;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    // Apply permissions
    document.getElementById('sidebar-avatar').textContent = role.avatar;
    document.getElementById('sidebar-name').textContent = role.label;
    document.getElementById('sidebar-role').textContent = roleKey === 'farm_manager' ? 'Farm Operations' : 'Clinical Veterinarian';
    document.querySelectorAll('#navMenu .nav-item').forEach(item => {
        const page = item.dataset.page;
        item.style.display = role.allowed.includes(page) ? '' : 'none';
    });
    renD();
}

function logout() {
    if (!confirm('Log out?')) return;
    prodRole = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth-role').value = '';
    document.getElementById('pin').value = '';
    document.getElementById('prod-role-preview').style.display = 'none';
    document.getElementById('auth-err').style.display = 'none';
}
function nav(id,el){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById('p-'+id).classList.add('active'); if(el){ document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); el.classList.add('active'); } if(id==='cons'){ rx=[]; renRx(); } }
function tglSigns(el){ el.classList.toggle('active'); checkHints(); }
function checkHints(){
    let sel = [...document.querySelectorAll('#signs-box .chk-pill.active input')].map(i=>i.value);
    let found = HINTS.find(h=>h.s.every(s=>sel.includes(s)));
    document.getElementById('hint').style.display = found?'block':'none';
    if(found) document.getElementById('hint').innerHTML = "💡 " + found.d;
}
function ac(q){
    let b = document.getElementById('ac');
    if(!q){ b.style.display='none'; return; }
    let m = DB.filter(d=>d.n.toLowerCase().includes(q.toLowerCase())||d.b.toLowerCase().includes(q.toLowerCase()));
    b.innerHTML = m.map(d=>`<div class="ac-item" onclick="addRx('${d.n}')">${d.n} (${d.b})</div>`).join('');
    b.style.display='block';
}
function addRx(n){
    let d = DB.find(x=>x.n===n);
    let wt = parseFloat(document.getElementById('wt').value)||0;
    let s = document.getElementById('species').value;
    let calc = "";
    if(wt>0 && d.g.includes(s)){
        let rate = parseFloat(d.g.split(s+':')[1]);
        calc = (wt * rate).toFixed(2) + " " + d.u;
    }
    rx.push({n, c:calc}); document.getElementById('srch').value=''; document.getElementById('ac').style.display='none'; renRx();
}
function renRx(){
    document.getElementById('rx-list').innerHTML = rx.map((x,i)=>`<div class="rx-row"><div><strong>${x.n}</strong></div><input type="text" value="Dose: ${x.c}" style="flex:1;"><div class="rx-del" onclick="rx.splice(${i},1);renRx()">✕</div></div>`).join('');
}
function calc(){ rx.forEach(r=>{ let d=DB.find(x=>x.n===r.n); let wt=parseFloat(document.getElementById('wt').value)||0; let s=document.getElementById('species').value; if(wt>0&&d.g.includes(s)){ r.c=(wt*parseFloat(d.g.split(s+':')[1])).toFixed(2)+" "+d.u; } }); renRx(); }
function save(){ let rc={o:document.getElementById('owner').value, s:document.getElementById('species').value, d:new Date().toLocaleDateString()}; data.unshift(rc); localStorage.setItem('nv_d',JSON.stringify(data)); renD(); nav('dash'); }
function renD(){ document.getElementById('dashTable').innerHTML = "<tr><th>Date</th><th>Owner</th><th>Species</th></tr>"+data.map(r=>`<tr><td>${r.d}</td><td>${r.o}</td><td>${r.s}</td></tr>`).join(''); }
function setL(l,b){
    document.querySelectorAll('.lang-btn').forEach(btn=>btn.classList.remove('active')); b.classList.add('active');
    document.querySelectorAll('[data-i18n]').forEach(el=>{
        if(!el.dataset.en) el.dataset.en = el.innerText;
        el.innerText = (l==='en')?el.dataset.en:(LANG[l][el.dataset.en]||el.dataset.en);
    });
}
</script>
</body>
</html>
